version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: getescala-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: getescala
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: getescala-redis
    ports:
      - "6379:6379"

volumes:
  db_data:
