services:
  # Backend Service
  - type: web
    name: getescala-backend
    runtime: docker
    repo: https://github.com/humbertohabib/getescala
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: getescala-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: getescala-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: getescala-redis
          property: port
      - key: JWT_SECRET
        generateValue: true
      - key: app.cors.allowedOrigins
        fromService:
          type: static
          name: getescala-frontend
          property: url

  # Frontend Service
  - type: static
    name: getescala-frontend
    repo: https://github.com/humbertohabib/getescala
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: getescala-backend
          property: url

  # Redis Service
  - type: redis
    name: getescala-redis
    plan: free
    ipAllowList: [] # Internal access only

databases:
  - name: getescala-db
    databaseName: getescala
    user: getescala
    plan: free
    ipAllowList: [] # Internal access only
