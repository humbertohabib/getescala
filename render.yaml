services:
  # Backend Service
  - type: web
    name: getescala-backend
    env: docker
    plan: free
    repo: https://github.com/humbertohabib/getescala
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: getescala-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: redis
          name: getescala-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: getescala-redis
          property: port
      - key: JWT_SECRET
        generateValue: true

  # Frontend Service
  - type: web
    name: getescala-frontend
    env: static
    plan: free
    repo: https://github.com/humbertohabib/getescala
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: getescala-backend
          property: host

  # Redis Service
  - type: redis
    name: getescala-redis
    plan: free
    ipAllowList: [] # Internal access only

databases:
  - name: getescala-db
    databaseName: getescala
    user: getescala
    plan: free
    ipAllowList: [] # Internal access only
