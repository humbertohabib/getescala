spring.application.name=getescala-backend

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/getescala}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
# Optional: Redis password if needed
# spring.data.redis.password=${REDIS_PASSWORD:}

# Server Configuration
server.port=${PORT:8080}

# JWT Configuration
app.jwtSecret=${JWT_SECRET:9a4f2c8d3b7a1e6f45c8a0b3f2e6d9c8b4567e901234567890abcdef12345678}
app.jwtExpirationInMs=86400000

# CORS Configuration (Handled in SecurityConfig, but good to have allowed origins env var if needed)
# app.cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
